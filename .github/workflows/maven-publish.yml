name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build with Maven
        run: mvn clean install

      - name: Run tests
        run: mvn test

      - name: Build Docker images
        run: |
          docker build -t userservice:latest ./UserService
          docker build -t hotelservice:latest ./HotelService
          docker build -t ratingservice:latest ./RatingService
          docker build -t serviceregistry:latest ./ServiceRegistry
          docker build -t configserver:latest ./ConfigServer
          docker build -t apigateway:latest ./ApiGateway

      - name: Push Docker images to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker push userservice:latest
          docker push hotelservice:latest
          docker push ratingservice:latest
          docker push serviceregistry:latest
          docker push configserver:latest
          docker push apigateway:latest
